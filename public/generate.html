<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブログ自動生成</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    h1 {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .field {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #4a90d9;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 12px;
    }
    button:hover { background: #3a7bc8; }
    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    .result {
      margin-top: 24px;
      padding: 20px;
      border-radius: 8px;
      display: none;
    }
    .result.success {
      background: #eef6ee;
      border: 1px solid #b5d8b5;
      display: block;
    }
    .result.error {
      background: #fdeaea;
      border: 1px solid #e8b4b4;
      display: block;
    }
    .result h3 {
      font-size: 0.95rem;
      margin-bottom: 8px;
    }
    .result p {
      font-size: 0.85rem;
      color: #555;
      line-height: 1.5;
    }
    .result a {
      color: #4a90d9;
      text-decoration: none;
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>ブログ記事を自動生成</h1>
    <p class="subtitle">検索キーワードを3つ入力すると、AIが記事を生成してWordPressに下書き保存します。</p>

    <p style="margin-bottom: 24px;"><a href="/" style="color: #4a90d9; text-decoration: none; font-size: 0.9rem;">← スケジュール一覧へ</a></p>

    <form id="generateForm">
      <div class="field">
        <label for="keyword1">キーワード 1</label>
        <input type="text" id="keyword1" placeholder="例: 吹奏楽 コンクール" required>
      </div>
      <div class="field">
        <label for="keyword2">キーワード 2</label>
        <input type="text" id="keyword2" placeholder="例: 練習方法" required>
      </div>
      <div class="field">
        <label for="keyword3">キーワード 3</label>
        <input type="text" id="keyword3" placeholder="例: 初心者 上達" required>
      </div>
      <button type="submit" id="submitBtn">記事を生成する</button>
    </form>

    <div class="result" id="result"></div>
  </div>

  <script>
    const form = document.getElementById('generateForm');
    const btn = document.getElementById('submitBtn');
    const resultDiv = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const keywords = [
        document.getElementById('keyword1').value.trim(),
        document.getElementById('keyword2').value.trim(),
        document.getElementById('keyword3').value.trim(),
      ];

      if (keywords.some(k => !k)) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>生成中...（1〜2分かかります）';
      resultDiv.className = 'result';
      resultDiv.style.display = 'none';

      try {
        const res = await fetch('/blog-generator/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keywords }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || `HTTP ${res.status}`);
        }

        const data = await res.json();
        resultDiv.className = 'result success';
        resultDiv.innerHTML = `
          <h3>下書きを作成しました</h3>
          <p><strong>タイトル:</strong> ${data.title}</p>
          <p><strong>要約:</strong> ${data.excerpt}</p>
          <p><strong>投稿ID:</strong> ${data.postId}</p>
          ${data.link ? `<p><a href="${data.link}" target="_blank">WordPress で確認する →</a></p>` : ''}
        `;
      } catch (err) {
        resultDiv.className = 'result error';
        resultDiv.innerHTML = `<h3>エラー</h3><p>${err.message}</p>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '記事を生成する';
      }
    });
  </script>
</body>
</html>
